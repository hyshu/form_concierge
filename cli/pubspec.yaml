name: form_concierge_cli
description: CLI for Form Concierge setup and tooling.
version: 0.2.1
homepage: https://github.com/hyshu/form_concierge
repository: https://github.com/hyshu/form_concierge/tree/main/cli
issue_tracker: https://github.com/hyshu/form_concierge/issues

environment:
  sdk: ^3.12.0

executables:
  # Global activate installs both names; `dart run form_concierge_cli` uses bin/.
  form_concierge: form_concierge_cli
  form_concierge_cli: form_concierge_cli

dependencies:
  archive: ^4.0.7
  args: ^2.7.0
  crypto: ^3.0.6
  http: ^1.2.2
  path: ^1.9.1
  pub_semver: ^2.2.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.1
