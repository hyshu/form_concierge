name: form_concierge
description: Embeddable Flutter survey package for Form Concierge.
version: 0.1.0
homepage: https://github.com/hyshu/form_concierge
repository: https://github.com/hyshu/form_concierge/tree/main/widget
issue_tracker: https://github.com/hyshu/form_concierge/issues
topics:
  - cloudflare
  - flutter-widget
  - forms
  - surveys

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.6
  form_concierge_client: ^0.1.0
  image_picker: ^1.2.3

# Keep monorepo development on the matching local client source. Pub ignores
# dependency overrides when consumers install this package.
dependency_overrides:
  form_concierge_client:
    path: ../client

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  http: ^1.2.2
