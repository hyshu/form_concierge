name: form_concierge
description: An embeddable Flutter survey package on Cloudflare, featuring an API, an admin dashboard, and web forms built with Jaspr.
version: 0.2.1
homepage: https://github.com/hyshu/form_concierge
repository: https://github.com/hyshu/form_concierge/tree/main/widget
issue_tracker: https://github.com/hyshu/form_concierge/issues

screenshots:
  - description: Form Concierge logo
    path: screenshots/logo.png

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.6
  form_concierge_client: ^0.2.1
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  http: ^1.2.2
