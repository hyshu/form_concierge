name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit, analysis, builds
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          cache: true

      - name: Add Dart pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Run static checks and unit tests
        run: bash tool/ci/static_checks.sh

  e2e:
    name: Docker localhost E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Run API, admin, web, and in-app E2E in Docker
        run: docker compose -f tool/ci/docker-compose.e2e.yml run --rm e2e

  swift:
    name: Swift package tests
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Test SwiftUI package
        working-directory: swiftui
        run: swift test
