name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Typecheck worker
        working-directory: worker
        run: npm run typecheck

      - name: Validate D1 migrations
        working-directory: worker
        run: npm run d1:migrate:local

      - name: Analyze client
        working-directory: client
        run: |
          dart pub get
          dart analyze

      - name: Analyze web
        working-directory: web
        run: |
          dart pub get
          dart analyze

      - name: Analyze widget
        working-directory: widget
        run: flutter analyze

      - name: Test admin dashboard
        working-directory: admin_dashboard
        run: |
          flutter analyze
          flutter test

      - name: Build SwiftUI package
        working-directory: swiftui
        run: swift build
